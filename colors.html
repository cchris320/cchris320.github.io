<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .box {
            width: 500px;
            padding: 10px 15px;
            margin: 10px 0;
            font-weight: bold;
            font-size: 1.4em;
        }

        .box1 {
            background-color: lightblue;
            border: 6px double red;
            color: black;
        }

        .box2 {
            background-color: yellow;
            border: 3px solid cyan;
            border-radius: 10px;
            color: black;
        }

        .box3 {
            background-color: seagreen;
            border: 6px dotted gray;
            color: black;
        }
    </style>
</head>
<body>
    <div class="box box1">Hello World</div>
    <div class="box box2">Hello World</div>
    <div class="box box3">Hello World</div>
</body>
</html>
