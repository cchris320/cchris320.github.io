<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background-color: #51b5ee;
}

.layout {
  width: min(88vw, 640px);
  padding: 12px;
  display: grid;
  gap: 6px;
  grid-template-rows: 120px 135px 75px;
  background-color: #ffffff;
  border-radius: 8px;
}

.header {
  background-color: #b8df41;
}

.content {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.content div {
  background-color: #00b9c4;
}

.footer {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.footer div {
  background-color: #e8eef0;
}

@media (max-width: 479px) {
  .layout {
    width: min(88vw, 280px);
    grid-template-rows: 88px auto auto;
  }

  .content {
    grid-template-columns: 1fr;
    grid-auto-rows: 50px;
  }

  .footer {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 38px;
  }
}
</style>
</head>
<body>

<main class="layout" aria-label="Responsive layout demo">
  <div class="header"></div>

  <section class="content" aria-label="Main content blocks">
    <div></div>
    <div></div>
    <div></div>
  </section>

  <section class="footer" aria-label="Footer blocks">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </section>
</main>

</body>
</html>
