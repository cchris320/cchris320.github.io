<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Image Styling</title>
<style>
body {
  margin: 40px;
  font-family: Arial, sans-serif;
}

.image-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  width: 100%;
}

.rounded-image {
  width: 33%;
  height: 300px;
  border-radius: 18px;
  object-fit: cover;
}

.circle-image {
  width: 150px;
  height: 150px;
  border: 1px solid #333;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.distorted-image {
  width: 33%;
  height: 300px;
  object-fit: fill;
}
</style>
</head>
<body>

<div class="image-row">
  <img class="rounded-image" src="https://commons.wikimedia.org/wiki/Special:FilePath/Paris_eiffel.JPG" alt="Eiffel Tower in Paris">
  <img class="circle-image" src="https://commons.wikimedia.org/wiki/Special:FilePath/Glacier.swiss.500pix.jpg" alt="Glacier in Switzerland">
  <img class="distorted-image" src="https://commons.wikimedia.org/wiki/Special:FilePath/Paris_eiffel.JPG" alt="Eiffel Tower in Paris">
</div>

</body>
</html>
