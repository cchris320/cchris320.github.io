<!DOCTYPE html>
<html>
<head>
<style>

body {
  background-color: #eee;
}

.container {
  background-color: white;
  padding: 20px;
  margin: 50px;
  border: 1px solid #ccc;
  min-height: 300px;
}

table, td, th {
  border: 1px solid black;
}

table {
  border-collapse: collapse;
  width: 50%;
}

th {
  height: 70px;
  background-color: darkgray;
  color: white;
}

tr:nth-child(even){
    background-color: yellow;
}

div.fixed {
  position: fixed;
  top: 70px;
  right: 70px;
  width: 200px;
  border: 3px solid green;
  padding: 10px;
  background-color: white;
}

</style>
</head>

<body>

<div class="container">

  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

</div>

<div class="fixed">
  This div element has position: fixed;
</div>

</body>
</html>
