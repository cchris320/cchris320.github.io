<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button and Image Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: 'Roboto', 'Arial', sans-serif;
        }

        .container {
            background-color: #ffffff;
            padding: 20px;
            border: 1px solid #eaeaea;
            display: inline-block;
        }

        .header-area {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }

        .custom-button {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            cursor: pointer;
            box-sizing: border-box;
            text-decoration: none;
            line-height: 1;
        }

        .preview-image {
            width: 450px;
            height: 240px;
            display: block;
            border: 1px solid #cccccc;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <a href="index.html" class="custom-button">查看資訊</a>
        </div>
        
        <!-- 使用 Base64 內嵌圖片，確保離線也能顯示灰色佔位圖 -->
        <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDUwIiBoZWlnaHQ9IjI0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZWVlIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiNhYmEiIGZvbnQtc2l6ZT0iMTgiIGR5PSIuM2VtIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj40NTB4MjQwIFByZXZpZXcgSW1hZ2U8L3RleHQ+PC9zdmc+" alt="Preview Image" class="preview-image">
    </div>

</body>
</html>
