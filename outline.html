<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: time new roman, sans-serif;
            padding: 40px;
        }

        /* Card container */
        .card {
            background-color: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            padding: 30px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: black;
            font-weight: bold;
            padding-bottom: 4px;
            /* Pink shadow + overline */
            text-shadow: 2px 2px 6px pink;
            text-decoration: overline;
        }

        h2 {
            color: black;
            font-style: italic;
            font-weight: normal;
            padding: 6px 10px;
            display: block;
            /* Black border + yellow box shadow */
            border: 3px solid black;
            box-shadow: 4px 4px 0px yellow;
        }

        h3 {
            color: black;
            text-align: right;
            text-decoration: underline;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>This is heading 1</h1>
        <h2>This is heading 2</h2>
        <h3>This is heading 3</h3>
    </div>
</body>
</html>
